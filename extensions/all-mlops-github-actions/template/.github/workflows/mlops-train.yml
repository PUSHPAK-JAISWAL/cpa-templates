name: MLOps Continuous Training

on:
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Train (CPU)
        run: |
          uv sync
          uv run mlops-train --config configs/default.yaml
