name: Smoke Test

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test:
    name: Smoke test scaffolded projects
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: fastapi-starter
            extension: ""
          - name: fastapi-starter + github-setup
            extension: github-setup
          - name: fastapi-starter + docker
            extension: python-docker
          - name: fastapi-starter + postgres
            extension: python-postgres
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cpa-templates
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Checkout create-python-app
        uses: actions/checkout@v4
        with:
          repository: Create-Python-App/create-python-app
          path: create-python-app
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Resolve CLI (PyPI preferred, source fallback)
        id: cli
        run: |
          if uv tool install "create-awesome-python-app>=0.1.0"; then
            echo "mode=pypi" >> "$GITHUB_OUTPUT"
            echo "bin=create-awesome-python-app" >> "$GITHUB_OUTPUT"
          else
            echo "PyPI install failed; using create-python-app source checkout"
            uv sync --directory create-python-app --group dev
            echo "mode=source" >> "$GITHUB_OUTPUT"
            echo "bin=uv run --directory create-python-app create-awesome-python-app" >> "$GITHUB_OUTPUT"
          fi

      - name: Scaffold project
        env:
          CI: "true"
          CPA_SKIP_GIT: "1"
          CPA_TEMPLATES_ROOT: ${{ github.workspace }}
        run: |
          ADDON_ARGS=()
          if [ -n "${{ matrix.extension }}" ]; then
            ADDON_ARGS+=(--addons "file://${CPA_TEMPLATES_ROOT}?subdir=extensions/${{ matrix.extension }}")
          fi
          # Typer requires options before the project-directory argument when
          # the CLI also exposes subcommands (e.g. `cache`).
          ${{ steps.cli.outputs.bin }} \
            --template "file://${CPA_TEMPLATES_ROOT}?subdir=templates/fastapi-starter" \
            --no-interactive --no-install \
            "${ADDON_ARGS[@]}" \
            smoke-test-project
          echo "Project scaffolded: ${{ matrix.name }} (cli=${{ steps.cli.outputs.mode }})"

      - name: Run basic checks
        working-directory: smoke-test-project
        run: |
          uv sync
          uv run ruff check .
          uv run pytest -q
          if [ -f compose.yml ]; then test -f compose.yml; fi
          if [ -f docker/postgres/compose.yml ]; then test -f docker/postgres/compose.yml; fi
          echo "Smoke test passed: ${{ matrix.name }}"
