name: Smoke Test

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test:
    name: Smoke test scaffolded projects
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: fastapi-starter
            extension: ""
          - name: fastapi-starter + github-setup
            extension: github-setup
          - name: fastapi-starter + docker
            extension: python-docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cpa-templates
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Checkout create-python-app
        uses: actions/checkout@v4
        with:
          repository: Create-Python-App/create-python-app
          path: create-python-app
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install CLI from source
        working-directory: create-python-app
        run: uv sync --group dev

      - name: Scaffold project
        env:
          CI: "true"
          CPA_SKIP_GIT: "1"
          CPA_TEMPLATES_ROOT: ${{ github.workspace }}
        run: |
          ADDON_ARGS=()
          if [ -n "${{ matrix.extension }}" ]; then
            ADDON_ARGS+=(--addons "file://${CPA_TEMPLATES_ROOT}?subdir=extensions/${{ matrix.extension }}")
          fi
          uv run --directory create-python-app create-awesome-python-app smoke-test-project \
            --template "file://${CPA_TEMPLATES_ROOT}?subdir=templates/fastapi-starter" \
            --no-interactive --no-install \
            "${ADDON_ARGS[@]}"
          echo "Project scaffolded: ${{ matrix.name }}"

      - name: Run basic checks
        working-directory: smoke-test-project
        run: |
          uv sync
          uv run ruff check .
          uv run pytest -q
          echo "Smoke test passed: ${{ matrix.name }}"
