name: Test Template and Extension Combinations

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * 0" # Weekly full matrix on Sunday at midnight UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-combinations:
    name: Generate test combinations
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Generate random combinations
        id: set-matrix
        run: |
          python3 <<'EOF'
          import json
          import os
          import random
          import re

          with open("templates.json", encoding="utf-8") as f:
              data = json.load(f)

          repo_dir = os.getcwd()
          extensions = data["extensions"]

          def ext_local_url(ext):
              match = re.search(r"/extensions/([^/]+)(?:/|$)", ext["url"])
              directory = match.group(1) if match else None
              return f"file://{repo_dir}?subdir=extensions/{directory}" if directory else None

          def has_incompatibility(selected, candidate):
              candidate_slugs = {candidate["slug"]}
              selected_slugs = {ext["slug"] for ext in selected}
              for ext in selected:
                  incompatible = ext.get("incompatibleWith") or []
                  if any(slug in candidate_slugs for slug in incompatible):
                      return True
                  candidate_incompatible = candidate.get("incompatibleWith") or []
                  if any(slug in selected_slugs for slug in candidate_incompatible):
                      return True
              return False

          random_combinations = []
          for template in data["templates"]:
              compatible_extensions = [
                  ext
                  for ext in extensions
                  if template["type"] in (ext["type"] if isinstance(ext["type"], list) else [ext["type"]])
              ]

              categories = sorted({ext["category"] for ext in compatible_extensions})
              selected_extensions = []
              for category in categories:
                  category_extensions = [ext for ext in compatible_extensions if ext["category"] == category]
                  available = [ext for ext in category_extensions if not has_incompatibility(selected_extensions, ext)]
                  if not available:
                      continue
                  selected_extensions.append(random.choice(available))

              tpl_match = re.search(r"/templates/([^/]+)(?:/|$)", template["url"])
              tpl_dir = tpl_match.group(1) if tpl_match else None
              template_url = (
                  f"file://{repo_dir}?subdir=templates/{tpl_dir}" if tpl_dir else template["slug"]
              )

              random_combinations.append(
                  {
                      "template": template["slug"],
                      "templateUrl": template_url,
                      "extensions": [url for ext in selected_extensions if (url := ext_local_url(ext))],
                  }
              )

          matrix = json.dumps(random_combinations)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"matrix={matrix}\n")
          EOF

  test-combinations:
    name: Test ${{ matrix.combination.template }}
    needs: generate-combinations
    strategy:
      fail-fast: false
      matrix:
        combination: ${{ fromJson(needs.generate-combinations.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cpa-templates
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Checkout create-python-app
        uses: actions/checkout@v4
        with:
          repository: Create-Python-App/create-python-app
          path: create-python-app
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Resolve CLI (PyPI preferred, source fallback)
        id: cli
        run: |
          if uv tool install "create-awesome-python-app>=0.1.0"; then
            echo "mode=pypi" >> "$GITHUB_OUTPUT"
            echo "bin=create-awesome-python-app" >> "$GITHUB_OUTPUT"
          else
            echo "PyPI install failed; using create-python-app source checkout"
            uv sync --directory create-python-app --group dev
            echo "mode=source" >> "$GITHUB_OUTPUT"
            echo "bin=uv run --directory create-python-app create-awesome-python-app" >> "$GITHUB_OUTPUT"
          fi

      - name: Scaffold and test combination
        env:
          CI: "true"
          CPA_SKIP_GIT: "1"
          CPA_TEMPLATES_ROOT: ${{ github.workspace }}
        run: |
          echo "Testing template: ${{ matrix.combination.template }}"
          echo "Template URL: ${{ matrix.combination.templateUrl }}"
          echo "With extensions: ${{ join(matrix.combination.extensions, ' ') }}"

          ADDON_ARGS=()
          ADDONS="${{ join(matrix.combination.extensions, ' ') }}"
          if [ -n "$ADDONS" ]; then
            read -ra EXT_URLS <<< "$ADDONS"
            ADDON_ARGS=(--addons "${EXT_URLS[@]}")
          fi

          # Typer requires options before the project-directory argument when
          # the CLI also exposes subcommands (e.g. `cache`).
          ${{ steps.cli.outputs.bin }} \
            --template "${{ matrix.combination.templateUrl }}" \
            --no-interactive --no-install \
            "${ADDON_ARGS[@]}" \
            combination-test-project

          cd combination-test-project
          uv sync
          uv run ruff check .
          uv run pytest -q
          echo "Combination test passed: ${{ matrix.combination.template }} (cli=${{ steps.cli.outputs.mode }})"

  generate-full-matrix:
    name: Generate full test matrix
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Generate full combinations matrix
        id: set-matrix
        run: |
          python3 <<'EOF'
          import json
          import os
          import re

          with open("templates.json", encoding="utf-8") as f:
              data = json.load(f)

          repo_dir = os.getcwd()
          extensions = data["extensions"]

          def ext_local_url(ext):
              match = re.search(r"/extensions/([^/]+)(?:/|$)", ext["url"])
              directory = match.group(1) if match else None
              return f"file://{repo_dir}?subdir=extensions/{directory}" if directory else None

          def has_incompatibility(selected, candidate):
              candidate_slugs = {candidate["slug"]}
              selected_slugs = {ext["slug"] for ext in selected}
              for ext in selected:
                  incompatible = ext.get("incompatibleWith") or []
                  if any(slug in candidate_slugs for slug in incompatible):
                      return True
                  candidate_incompatible = candidate.get("incompatibleWith") or []
                  if any(slug in selected_slugs for slug in candidate_incompatible):
                      return True
              return False

          combinations = []
          for template in data["templates"]:
              compatible_extensions = [
                  ext
                  for ext in extensions
                  if template["type"] in (ext["type"] if isinstance(ext["type"], list) else [ext["type"]])
              ]

              selected_extensions = []
              for ext in compatible_extensions:
                  if not has_incompatibility(selected_extensions, ext):
                      selected_extensions.append(ext)

              if not selected_extensions:
                  continue

              tpl_match = re.search(r"/templates/([^/]+)(?:/|$)", template["url"])
              tpl_dir = tpl_match.group(1) if tpl_match else None
              template_url = (
                  f"file://{repo_dir}?subdir=templates/{tpl_dir}" if tpl_dir else template["slug"]
              )

              combinations.append(
                  {
                      "template": template["slug"],
                      "templateUrl": template_url,
                      "extensions": [url for ext in selected_extensions if (url := ext_local_url(ext))],
                  }
              )

          matrix = json.dumps(combinations)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"matrix={matrix}\n")
          print(f"Generated {len(combinations)} full combinations")
          EOF

  test-full-matrix:
    name: Full ${{ matrix.combination.template }}
    needs: generate-full-matrix
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        combination: ${{ fromJson(needs.generate-full-matrix.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cpa-templates
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Checkout create-python-app
        uses: actions/checkout@v4
        with:
          repository: Create-Python-App/create-python-app
          path: create-python-app
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Resolve CLI (PyPI preferred, source fallback)
        id: cli
        run: |
          if uv tool install "create-awesome-python-app>=0.1.0"; then
            echo "mode=pypi" >> "$GITHUB_OUTPUT"
            echo "bin=create-awesome-python-app" >> "$GITHUB_OUTPUT"
          else
            echo "PyPI install failed; using create-python-app source checkout"
            uv sync --directory create-python-app --group dev
            echo "mode=source" >> "$GITHUB_OUTPUT"
            echo "bin=uv run --directory create-python-app create-awesome-python-app" >> "$GITHUB_OUTPUT"
          fi

      - name: Scaffold and test full combination
        env:
          CI: "true"
          CPA_SKIP_GIT: "1"
          CPA_TEMPLATES_ROOT: ${{ github.workspace }}
        run: |
          echo "Testing: ${{ matrix.combination.template }}"
          echo "With ALL extensions: ${{ join(matrix.combination.extensions, ' ') }}"

          ADDON_ARGS=()
          ADDONS="${{ join(matrix.combination.extensions, ' ') }}"
          if [ -n "$ADDONS" ]; then
            read -ra EXT_URLS <<< "$ADDONS"
            ADDON_ARGS=(--addons "${EXT_URLS[@]}")
          fi

          ${{ steps.cli.outputs.bin }} \
            --template "${{ matrix.combination.templateUrl }}" \
            --no-interactive --no-install \
            "${ADDON_ARGS[@]}" \
            combination-test-project

          cd combination-test-project
          uv sync
          uv run ruff check .
          uv run pytest -q
          echo "Full combination test passed: ${{ matrix.combination.template }} (cli=${{ steps.cli.outputs.mode }})"
